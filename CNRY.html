<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>cnrysense — engine health prototype</title>
<link rel="stylesheet" href="styles.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { background: #07070A; min-height: 100vh; font-family: 'Inter', sans-serif; }
  .stage {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 180px 20px 80px;
    background:
      radial-gradient(ellipse 70% 50% at 50% 20%, rgba(245,197,38,0.03), transparent 60%),
      #07070A;
  }
  /* Drop a deeper shadow on the iOS frame so it pops against the dark stage. */
  .phone-stage-shadow { filter: drop-shadow(0 40px 120px rgba(0,0,0,0.7)); }

  /* ─── Penumbra slider (demo control) ───────────────────────── */
  .pen-control {
    position: fixed; top: 28px; left: 50%; transform: translateX(-50%); z-index: 300;
    width: 280px;
    padding: 12px 16px;
    background: rgba(14,14,18,0.82); backdrop-filter: blur(22px) saturate(160%); -webkit-backdrop-filter: blur(22px) saturate(160%);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 999px;
    color: #fff; font-family: 'Inter', sans-serif;
  }
  .pen-rail-wrap { position: relative; padding: 6px 0; cursor: pointer; outline: none; }
  .pen-rail { position: relative; height: 8px; border-radius: 6px; overflow: hidden;
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.35); }
  .pen-thumb {
    position: absolute; top: 50%; width: 22px; height: 22px; border-radius: 11px;
    background: #fff; border: 2px solid rgba(255,255,255,0.95);
    transform: translate(-50%, -50%); cursor: grab;
    box-shadow: 0 3px 10px rgba(0,0,0,0.55), 0 0 0 3px rgba(255,255,255,0.06);
    transition: box-shadow 0.2s ease;
  }
  .pen-thumb:active { cursor: grabbing; box-shadow: 0 5px 16px rgba(0,0,0,0.7), 0 0 0 6px rgba(255,255,255,0.1); }
  .pen-thumb .thumb-dot {
    position: absolute; inset: 3px; border-radius: 50%; transition: background 0.4s ease;
  }

  .caption { position: absolute; bottom: -32px; left: 0; right: 0; text-align: center;
    font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.22em;
    color: rgba(255,255,255,0.3); text-transform: uppercase;
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="lib/data.js"></script>
<script src="lib/diagnostics.js"></script>
<script src="lib/penumbra.js"></script>
<script type="text/babel" src="lib/ios-frame.jsx"></script>
<script type="text/babel" src="lib/components.jsx"></script>
<script type="text/babel" src="lib/screens.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "treatment": "hybrid",
  "scoreDisplay": "numeral",
  "sparkVariant": "area",
  "typeTone": "instrument",
  "navStyle": "icons"
}/*EDITMODE-END*/;

function PhoneFrame({ children, dark = true, bottomBar = null }) {
  // Wraps the proper iOS 26 device frame from lib/ios-frame.jsx.
  // We pass `title` as undefined so IOSDevice does not render its built-in
  // nav bar — our screens render their own headers.
  return (
    <IOSDevice width={390} height={844} dark={dark} bottomBar={bottomBar}>
      {children}
    </IOSDevice>
  );
}

// Build a live "state" object that looks like ENGINE_STATES[key] but is derived
function useDerivedState(p) {
  return React.useMemo(() => {
    const d = window.Penumbra.derive(p);
    // make it discoverable as a key the existing screens can use
    window.ENGINE_STATES.penumbra = d;
    window.RHYTHM_READINGS.penumbra = window.Penumbra.rhythmTimelineAt(p);
    return d;
  }, [p]);
}

// Nuke any stale legacy state so the new prototype starts clean.
(function clearLegacy() {
  try {
    const legacyState = localStorage.getItem('cnry-state');
    if (legacyState && legacyState !== 'penumbra') {
      localStorage.removeItem('cnry-state');
    }
  } catch {}
})();

function App() {
  const [tweaks, setTweaks] = React.useState(() => {
    try {
      const stored = JSON.parse(localStorage.getItem('cnry-tweaks') || '{}');
      return { ...TWEAK_DEFAULTS, ...stored };
    } catch { return TWEAK_DEFAULTS; }
  });
  const [tweakMode, setTweakMode] = React.useState(false);
  const [p, setP] = React.useState(() => {
    const v = parseFloat(localStorage.getItem('cnry-penumbra'));
    return Number.isFinite(v) ? v : 82;
  });
  const [screen, setScreen] = React.useState(() => localStorage.getItem('cnry-screen') || 'home');
  const [metric, setMetric] = React.useState(null);

  const derived = useDerivedState(p);
  const stateKey = 'penumbra';

  React.useEffect(() => { localStorage.setItem('cnry-penumbra', String(p)); }, [p]);
  React.useEffect(() => { localStorage.setItem('cnry-screen', screen); }, [screen]);
  React.useEffect(() => { localStorage.setItem('cnry-tweaks', JSON.stringify(tweaks)); }, [tweaks]);

  React.useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweakMode(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweakMode(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const updateTweak = (key, value) => {
    const next = { ...tweaks, [key]: value };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: value } }, '*');
  };

  const onNav = (id) => {
    if (id === 'home') { setMetric(null); setScreen('home'); }
    else setScreen(id);
  };
  const onMetric = (kind) => { setMetric(kind); setScreen('metric'); };

  let content;
  if (screen === 'home') {
    content = <HomeScreen state={stateKey} treatment={tweaks.treatment} scoreDisplay={tweaks.scoreDisplay}
      sparkVariant={tweaks.sparkVariant} typeTone={tweaks.typeTone} navStyle={tweaks.navStyle}
      onNav={onNav} onMetric={onMetric}/>;
  } else if (screen === 'metric') {
    content = <MetricDetailScreen state={stateKey} kind={metric || 'rhythm'} onBack={() => { setMetric(null); setScreen('home'); }}
      navStyle={tweaks.navStyle} onNav={onNav}/>;
  } else if (screen === 'history') {
    content = <HistoryScreen state={stateKey} onNav={onNav} navStyle={tweaks.navStyle}/>;
  } else if (screen === 'alerts') {
    content = <AlertsScreen state={stateKey} onNav={onNav} navStyle={tweaks.navStyle}/>;
  } else if (screen === 'settings') {
    content = <ProfileScreen state={stateKey} onNav={onNav} navStyle={tweaks.navStyle}/>;
  }

  // BottomNav lives at App level so it stays pinned while screen content scrolls.
  const navActive = screen === 'metric' ? 'home' : screen;
  const bottomNav = (
    <BottomNav active={navActive} onNav={onNav} alertBadge={derived.banner !== null} style={tweaks.navStyle}/>
  );

  return (
    <div className="stage">
      <PenumbraControl p={p} setP={setP} derived={derived}/>
      <div style={{ position: 'relative' }}>
        <div className="phone-stage-shadow">
          <PhoneFrame dark={true} bottomBar={bottomNav}>{content}</PhoneFrame>
        </div>
        <div className="caption">
          cnrysense · live demo · drag the slider above
        </div>
      </div>
      {tweakMode && <TweaksPanel tweaks={tweaks} update={updateTweak}/>}
    </div>
  );
}

function PenumbraControl({ p, setP, derived }) {
  const railRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);

  // p=100 on LEFT, p=0 on RIGHT — so thumbPct = 100 - p
  const thumbPct = 100 - p;

  const updateFromClientX = (clientX) => {
    const rect = railRef.current.getBoundingClientRect();
    const t = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    setP(Math.round((1 - t) * 100));
  };

  const onPointerDown = (e) => {
    e.preventDefault();
    setDragging(true);
    updateFromClientX(e.clientX);
    const move = (ev) => updateFromClientX(ev.clientX);
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  const onKeyDown = (e) => {
    if (e.key === 'ArrowLeft' || e.key === 'ArrowDown') { e.preventDefault(); setP(Math.max(0, p - (e.shiftKey ? 10 : 2))); }
    if (e.key === 'ArrowRight' || e.key === 'ArrowUp') { e.preventDefault(); setP(Math.min(100, p + (e.shiftKey ? 10 : 2))); }
    if (e.key === 'Home') { e.preventDefault(); setP(100); }
    if (e.key === 'End')  { e.preventDefault(); setP(0); }
  };

  return (
    <div className="pen-control">
      <div className="pen-rail-wrap"
        ref={railRef}
        onPointerDown={onPointerDown}
        role="slider"
        aria-label="Penumbra"
        aria-valuemin="0" aria-valuemax="100" aria-valuenow={Math.round(p)}
        tabIndex={0}
        onKeyDown={onKeyDown}>
        <div className="pen-rail" style={{ background: window.Penumbra.gradientCSS() }}/>
        <div className="pen-thumb" style={{ left: `${thumbPct}%`, top: '50%' }}>
          <div className="thumb-dot" style={{ background: derived.glow }}/>
        </div>
      </div>
    </div>
  );
}

function TweaksPanel({ tweaks, update }) {
  const group = (title, key, options) => (
    <>
      <h4>{title}</h4>
      <div className="tweak-row">
        {options.map(([v, label]) => (
          <button key={v} onClick={() => update(key, v)}
            className={'tweak-chip' + (tweaks[key] === v ? ' active' : '')}>{label}</button>
        ))}
      </div>
    </>
  );
  return (
    <div className="tweak-panel">
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 12 }}>
        <div style={{ width: 6, height: 6, borderRadius: 3, background: '#F5C526' }}/>
        <span style={{ fontSize: 12, fontWeight: 700, letterSpacing: '0.14em', textTransform: 'uppercase' }}>Tweaks</span>
      </div>
      {group('Color treatment', 'treatment', [['full-bleed','Full-bleed'],['hybrid','Hybrid'],['dark-accent','Dark accent']])}
      {group('Score display', 'scoreDisplay', [['numeral','Numeral'],['ring','Ring'],['bird','Bird on gradient']])}
      {group('Sparkline', 'sparkVariant', [['line','Line'],['area','Area'],['dots','Dots']])}
      {group('Typography', 'typeTone', [['instrument','Instrument'],['healthapp','Health app']])}
      {group('Bottom nav', 'navStyle', [['labels','Labels'],['icons','Icons only'],['pill','Floating pill']])}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
